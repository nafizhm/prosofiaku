name: 🚀 Deploy to Niagahoster via FTP

on:
  push:
    branches:
      - main  # Ubah jika branch utama kamu bukan 'main'

jobs:
  ftp-deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: npm install

    - name: Build Project
      run: npm run build

    - name: 📂 Deploy to FTP Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: 147.93.80.48
        username: u775298753.prosofia.id
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        local-dir: dist/
        port: 21
